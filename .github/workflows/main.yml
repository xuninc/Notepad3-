name: Build iOS

on:
  workflow_dispatch:
  push:
    tags:
      - "ios-v*"

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-14
    timeout-minutes: 60

    defaults:
      run:
        working-directory: artifacts/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store dir
        id: pnpm-store
        shell: bash
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install workspace dependencies
        working-directory: .
        run: pnpm install --no-frozen-lockfile

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Expo prebuild (iOS)
        env:
          EXPO_NO_TELEMETRY: "1"
          CI: "1"
        run: pnpm exec expo prebuild --platform ios --clean --no-install

      - name: Pod install
        working-directory: artifacts/mobile/ios
        run: pod install --repo-update

      - name: Resolve scheme name
        id: scheme
        working-directory: artifacts/mobile/ios
        shell: bash
        run: |
          SCHEME=$(xcodebuild -workspace *.xcworkspace -list -json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['workspace']['schemes'][0])")
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Selected scheme: $SCHEME"

      - name: Archive (unsigned)
        working-directory: artifacts/mobile/ios
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace *.xcworkspace \
            -scheme "${{ steps.scheme.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/build/app.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            archive | xcpretty || true
          test -d "$PWD/build/app.xcarchive"

      - name: Package unsigned IPA
        working-directory: artifacts/mobile/ios
        run: |
          set -euo pipefail
          rm -rf Payload unsigned.ipa
          mkdir -p Payload
          cp -R build/app.xcarchive/Products/Applications/*.app Payload/
          zip -qry unsigned.ipa Payload
          ls -lh unsigned.ipa

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: notepad3pp-unsigned-ipa
          path: artifacts/mobile/ios/unsigned.ipa
          if-no-files-found: error
