name: Build iOS

on:
  workflow_dispatch:
  push:
    tags:
      - "ios-v*"

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15
    timeout-minutes: 60

    defaults:
      run:
        working-directory: artifacts/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store dir
        id: pnpm-store
        shell: bash
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install workspace dependencies
        working-directory: .
        run: pnpm install --no-frozen-lockfile

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Expo prebuild (iOS)
        env:
          EXPO_NO_TELEMETRY: "1"
          CI: "1"
        run: pnpm exec expo prebuild --platform ios --clean --no-install

      - name: Setup Ruby + Bundler (CocoaPods pin)
        if: hashFiles('artifacts/mobile/ios/Gemfile') != ''
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: artifacts/mobile/ios

      - name: Pod install
        working-directory: artifacts/mobile/ios
        shell: bash
        run: |
          set -euo pipefail
          POD_CMD="pod install"
          if [ -f Gemfile ]; then
            echo "==> Using bundler-pinned CocoaPods"
            POD_CMD="bundle exec pod install"
          else
            echo "==> Using system CocoaPods"
          fi
          for i in 1 2 3; do
            $POD_CMD && break || { echo "==> pod install failed (attempt $i), retrying in 30s..."; sleep 30; }
          done

      - name: Resolve scheme name
        id: scheme
        working-directory: artifacts/mobile/ios
        shell: bash
        run: |
          set -euo pipefail
          SCHEME=$(xcodebuild -project *.xcodeproj -list -json | python3 -c "import sys,json; d=json.load(sys.stdin); schemes=d['project']['schemes']; assert schemes, 'no schemes'; print(schemes[0])")
          if [ -z "$SCHEME" ]; then
            echo "ERROR: could not resolve scheme"
            xcodebuild -project *.xcodeproj -list || true
            exit 1
          fi
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Selected scheme: $SCHEME"

      - name: Show toolchain versions
        working-directory: artifacts/mobile/ios
        run: |
          xcodebuild -version
          which xcodebuild
          ruby --version || true
          pod --version || true
          node --version
          pnpm --version

      - name: Build (unsigned, device)
        working-directory: artifacts/mobile/ios
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace *.xcworkspace \
            -scheme "${{ steps.scheme.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$PWD/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO \
            build
          echo "==> build products:"
          ls -la build/Build/Products 2>/dev/null || true
          ls -la build/Build/Products/Release-iphoneos 2>/dev/null || true

      - name: Package unsigned IPA
        working-directory: artifacts/mobile/ios
        shell: bash
        run: |
          set -euo pipefail
          rm -rf Payload unsigned.ipa
          mkdir -p Payload
          PRODUCTS_DIR="build/Build/Products/Release-iphoneos"
          if [ ! -d "$PRODUCTS_DIR" ]; then
            echo "ERROR: products directory not found at $PRODUCTS_DIR"
            ls -la build/Build/Products 2>/dev/null || true
            find build -maxdepth 5 -name "*.app" -print 2>/dev/null || true
            exit 1
          fi
          APP_PATH="$(find "$PRODUCTS_DIR" -maxdepth 1 -name '*.app' -print -quit 2>/dev/null || true)"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: no .app found in $PRODUCTS_DIR"
            ls -la "$PRODUCTS_DIR" || true
            echo "==> searching elsewhere:"
            find build -maxdepth 6 -name "*.app" -print 2>/dev/null || true
            exit 1
          fi
          echo "Found app: $APP_PATH"
          du -sh "$APP_PATH" || true
          cp -R "$APP_PATH" Payload/
          zip -qry unsigned.ipa Payload
          ls -lh unsigned.ipa

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: notepad3pp-unsigned-ipa
          path: artifacts/mobile/ios/unsigned.ipa
          if-no-files-found: error
