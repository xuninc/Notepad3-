name: Build Android

on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: artifacts/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Get pnpm store dir
        id: pnpm-store
        shell: bash
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install workspace dependencies
        working-directory: .
        run: pnpm install --no-frozen-lockfile

      - name: Expo prebuild (Android)
        env:
          EXPO_NO_TELEMETRY: "1"
          CI: "1"
        run: pnpm exec expo prebuild --platform android --clean --no-install

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Show toolchain versions
        run: |
          java -version
          node --version
          pnpm --version

      - name: Build debug APK
        working-directory: artifacts/mobile/android
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace
          echo "==> APK outputs:"
          find app/build/outputs/apk -name "*.apk" -print

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: notepad3pp-debug-apk
          path: artifacts/mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
