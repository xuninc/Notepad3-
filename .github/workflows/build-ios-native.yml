name: Build iOS Native

on:
  workflow_dispatch:
  push:
    tags:
      - "ios-native-v*"

jobs:
  build:
    name: Build unsigned IPA (Swift native)
    runs-on: macos-15
    timeout-minutes: 30

    defaults:
      run:
        working-directory: artifacts/ios-native

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate xcodeproj
        run: xcodegen generate

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          xcodegen --version

      - name: Build (unsigned, device)
        run: |
          set -euo pipefail
          xcodebuild \
            -project Notepad3.xcodeproj \
            -scheme Notepad3 \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$PWD/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO \
            build

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          rm -rf Payload unsigned.ipa
          mkdir -p Payload
          PRODUCTS_DIR="build/Build/Products/Release-iphoneos"
          if [ ! -d "$PRODUCTS_DIR" ]; then
            echo "ERROR: products dir not found at $PRODUCTS_DIR"
            ls -la build/Build/Products 2>/dev/null || true
            find build -maxdepth 5 -name "*.app" -print 2>/dev/null || true
            exit 1
          fi
          APP_PATH="$(find "$PRODUCTS_DIR" -maxdepth 1 -name '*.app' -print -quit 2>/dev/null || true)"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: no .app in $PRODUCTS_DIR"
            ls -la "$PRODUCTS_DIR" || true
            exit 1
          fi
          echo "Found app: $APP_PATH"
          du -sh "$APP_PATH" || true
          cp -R "$APP_PATH" Payload/
          zip -qry unsigned.ipa Payload
          ls -lh unsigned.ipa

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: notepad3-native-unsigned-ipa
          path: artifacts/ios-native/unsigned.ipa
          if-no-files-found: error
