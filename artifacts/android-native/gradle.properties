# Use AndroidX libraries (required for Compose, modern AndroidX).
android.useAndroidX=true

# Kotlin code style (matches modern projects).
kotlin.code.style=official

# Don't error on AGP unused/unrecognized properties (forward compatibility).
android.nonTransitiveRClass=true

# Performance: parallel module builds + Gradle daemon + configuration cache.
org.gradle.parallel=true
org.gradle.daemon=true
org.gradle.configuration-cache=true
org.gradle.caching=true

# JVM flags for the Gradle daemon. 4 GB is comfortable for AGP 8.x cold builds.
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8 -XX:+UseG1GC

# Suppress warning about the new architecture detection logic.
android.suppressUnsupportedCompileSdk=35
